name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.1.${{ github.run_number }}
        name: Release v1.1.${{ github.run_number }}
        body: |
          ## FotMob Translator v1.1.${{ github.run_number }}

          ### Bug Fixes
          - Fix NewsFragment crash on navigation
          - Fix PlayersFragment crash when loading team data
          - Fix MatchesFragment infinite loading spinner
          - Fix LeaguesFragment error handling

          ### Android 16 Adaptation
          - Upgrade targetSdk to 35 (Android 16)
          - Upgrade all dependencies to latest versions

          ### Installation
          Download the APK file below and install it on your Android device.

          **Note**: You need to enable "Install from Unknown Sources" in your device settings.
        files: app/build/outputs/apk/debug/app-debug.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
